name: Trendyol Finance Backend CI

on:
  push:
    branches: ["claude/trendyol-api-integration-C7w1k"]
    paths:
      - "trendyol-finance-saas/backend/**"
      - ".github/workflows/trendyol-finance-ci.yml"
  pull_request:
    paths:
      - "trendyol-finance-saas/backend/**"
      - ".github/workflows/trendyol-finance-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trendyol-finance-saas/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Çözüm dosyası kullanmıyoruz: bazı SDK'lar .slnx üretip .sln ile uyumsuzluğa yol açıyor.
      # Api tüm üretim zincirini (Domain/Application/Integration/Infrastructure/Ingestion),
      # test projesi de Application+Integration'ı transitif olarak derler.
      - name: Build (Api)
        run: dotnet build src/TrendyolFinance.Api/TrendyolFinance.Api.csproj -c Release

      - name: Test
        run: dotnet test tests/TrendyolFinance.UnitTests/TrendyolFinance.UnitTests.csproj -c Release --verbosity normal
