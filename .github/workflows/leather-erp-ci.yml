name: Leather ERP CI

on:
  push:
    branches: ["claude/leather-production-management-R9F1H"]
    paths: ["leather-erp/**", ".github/workflows/leather-erp-ci.yml"]
  pull_request:
    paths: ["leather-erp/**", ".github/workflows/leather-erp-ci.yml"]

jobs:
  backend:
    name: Backend (.NET 8 — build & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: leather-erp/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore LeatherErp.sln
      - name: Build
        run: dotnet build LeatherErp.sln -c Release --no-restore
      - name: Test
        run: dotnet test LeatherErp.sln -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (Angular — build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: leather-erp/frontend/leather-erp-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: leather-erp/frontend/leather-erp-web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
